<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дигитално QR Меню</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- ОФИЦИАЛНОТО SDK НА SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-900 font-sans pb-12 min-h-screen relative">

    <!-- ФОН НА МЕНЮТО: морски пейзаж по подразбиране (CSS), или снимка от админ панела -->
    <div id="bg-photo" class="fixed inset-0 -z-20 bg-cover bg-center bg-gradient-to-b from-sky-200 via-cyan-100 to-amber-50"></div>
    <!-- мек ефект на слънце -->
    <div id="bg-sun" class="fixed top-10 right-10 w-40 h-40 rounded-full bg-yellow-100/70 blur-2xl -z-20"></div>
    <div id="bg-overlay" class="fixed inset-0 -z-10 hidden bg-white/75"></div>

    <!-- ХЕДЪР -->
    <header class="bg-white/40 backdrop-blur-md text-center py-7 px-4 shadow-sm rounded-b-3xl relative">
        <h1 class="text-2xl font-black tracking-wide truncate mt-2 text-cyan-950" id="restaurant-title">Зареждане...</h1>
        <p class="text-[11px] mt-1 uppercase tracking-widest font-bold text-cyan-800/70">Дигитално меню</p>
        <div class="w-10 h-[3px] bg-orange-400 mx-auto mt-3 rounded-full"></div>
    </header>

    <!-- ТЪРСАЧКА -->
    <div class="max-w-md mx-auto px-4 mt-3">
        <div class="relative">
            <input type="text" id="search-input" placeholder="Търси артикул..."
                class="w-full bg-white/80 border border-gray-200 rounded-full pl-10 pr-4 py-2.5 text-sm shadow-sm focus:outline-cyan-700">
            <svg class="w-4 h-4 text-gray-400 absolute left-3.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 10a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
        </div>
    </div>

    <!-- НАВИГАЦИЯ С КАТЕГОРИИ -->
    <div class="sticky top-0 bg-white/80 backdrop-blur-md shadow-sm z-10 py-3 mt-2">
        <div id="categories-nav" class="flex gap-2 overflow-x-auto px-4 no-scrollbar"></div>
    </div>

    <!-- СЪДЪРЖАНИЕ -->
    <main class="max-w-md mx-auto px-4 mt-4 space-y-8" id="menu-container">
        <div class="text-center py-12 text-gray-400 text-sm">Зареждане на менюто от облака...</div>
    </main>

    <!-- АВТОРСКИ ПОДПИС -->
    <footer class="mt-16 mb-8">
        <div class="text-center font-sans text-[0.65rem] uppercase tracking-[1px] text-gray-400 border-t border-gray-200 pt-6 mx-8">
            <p>© 2026 <strong>Радослав Чакъров</strong> | Дигитални решения</p>
        </div>
    </footer>

    <!-- МОДАЛ ЗА ДЕТАЙЛИ НА АРТИКУЛ -->
    <div id="item-modal" class="hidden fixed inset-0 bg-black/50 z-40 flex items-end sm:items-center justify-center">
        <div class="bg-white w-full sm:max-w-sm sm:rounded-2xl rounded-t-2xl max-h-[85vh] overflow-y-auto">
            <div class="relative">
                <button id="item-modal-close" class="absolute top-3 right-3 bg-white/90 rounded-full w-8 h-8 flex items-center justify-center text-gray-600 shadow cursor-pointer z-10">✕</button>
                <img id="item-modal-img" src="" alt="" class="w-full h-56 object-cover hidden">
            </div>
            <div class="p-5">
                <h2 id="item-modal-name" class="text-xl font-black"></h2>
                <p id="item-modal-desc" class="text-sm text-gray-500 mt-2"></p>
                <p id="item-modal-price" class="text-amber-600 font-bold text-lg mt-3"></p>
                <button id="item-modal-add-btn" class="w-full mt-4 bg-cyan-800 hover:bg-cyan-900 text-white font-bold py-3 rounded-xl text-sm transition cursor-pointer">
                    ➕ Добави в поръчката
                </button>
            </div>
        </div>
    </div>

    <!-- ПЛАВАЩ БУТОН ЗА КОЛИЧКАТА -->
    <button id="cart-fab" class="hidden fixed bottom-5 right-5 z-30 bg-cyan-800 hover:bg-cyan-900 text-white rounded-full shadow-lg px-5 py-3.5 flex items-center gap-2 font-bold text-sm cursor-pointer">
        🛒 <span id="cart-fab-count">0</span>
        <span id="cart-fab-total" class="text-cyan-100 font-semibold">· 0.00 €</span>
    </button>

    <!-- МОДАЛ НА КОЛИЧКАТА / ПОРЪЧКА -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/50 z-40 flex items-end sm:items-center justify-center">
        <div class="bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between p-4 border-b border-gray-100">
                <h2 class="text-lg font-black text-slate-800">🛒 Твоята поръчка</h2>
                <button id="cart-modal-close" class="bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center text-gray-600 cursor-pointer">✕</button>
            </div>

            <div id="cart-items-list" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Динамични редове -->
            </div>

            <div class="p-4 border-t border-gray-100 space-y-3">
                <div class="flex justify-between items-center font-bold text-slate-800">
                    <span>Общо:</span>
                    <span id="cart-total" class="text-amber-600 text-lg">0.00 €</span>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Номер на маса</label>
                    <input type="number" id="table-number-input" min="1" placeholder="напр. 7"
                        class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-sm font-bold focus:outline-cyan-700">
                </div>
                <button id="submit-order-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl text-sm transition cursor-pointer">
                    Изпрати поръчката
                </button>
                <p id="order-error" class="text-xs text-red-600 text-center font-semibold hidden"></p>
            </div>
        </div>
    </div>

    <!-- ПОТВЪРЖДЕНИЕ НА ПОРЪЧКАТА -->
    <div id="order-success-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center px-6">
        <div class="bg-white rounded-2xl p-6 max-w-xs w-full text-center space-y-3">
            <div class="text-4xl">✅</div>
            <h2 class="text-lg font-black text-slate-800">Поръчката е приета!</h2>
            <p class="text-sm text-gray-500">Персоналът вече я вижда и ще я подготви.</p>
            <button id="order-success-close" class="w-full bg-cyan-800 hover:bg-cyan-900 text-white font-bold py-2.5 rounded-xl text-sm cursor-pointer">
                Готово
            </button>
        </div>
    </div>

    <!-- Основен скрипт -->
    <script src="app.js"></script>
</body>
</html>
